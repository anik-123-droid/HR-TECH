version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - matchintel_net
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-matchintel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - matchintel_net
    restart: always

  redis:
    image: redis:alpine
    networks:
      - matchintel_net
    restart: always

volumes:
  postgres_data:

networks:
  matchintel_net:
    driver: bridge
